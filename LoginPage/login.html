<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Pyramids - Login</title>

    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="../mockData.js" defer></script>
    <script src="../storage.js" defer></script>
    <script src="../global.js" defer></script>
    <script src="js/login.js" defer></script>
    <script src="../auth-premium.js" defer></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="neon-border-wrap">
            <main class="layout">
                
                <div class="image-panel reveal-item">
                    <div class="image-inner">
                        <img src="imagesUsed/laytoutImageLogin.jpeg" alt="Pyramids of Giza at golden hour"
                            class="backdrop-img">
                        <div class="overlay-text">
                            <span class="tag">Welcome Back</span>
                            <h2>Beyond the Pyramids</h2>
                            <p>Sign in to resume your journey through the timeless wonders of the ancient world.</p>
                        </div>
                    </div>
                </div>

                
                <div class="form-panel">
                    <div class="form-header reveal-item">
                        <img src="../WebsiteBanner.png" alt="Beyond the Pyramids" class="logo">
                        <h1>Access Your Portal</h1>
                        <p>Enter your credentials to manage your itineraries and bookings.</p>
                    </div>

                    <form id="login-form" class="editorial-form reveal-item">
                        <div class="field">
                            <label for="username">Email or Username</label>
                            <input type="text" id="username" name="username" placeholder="name@example.com"
                                autocomplete="off" required>
                        </div>

                        <div class="field">
                            <label for="password">Security Password</label>
                            <div class="pass-wrapper">
                                <input type="password" id="password" name="password" placeholder="••••••••"
                                    required>
                                <button type="button" class="password-toggle" id="togglePasswordBtn"
                                    aria-label="Show password">
                                    <i class="far fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="field-row">
                            <label class="checkbox-label">
                                <input type="checkbox" id="rememberMe" class="checkbox">
                                <span>Keep me signed in</span>
                            </label>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="submit-btn primary-btn">Sign In</button>
                        </div>
                    </form>


                    <div class="reg-prompt reveal-item">
                        <p>New explorer? <a href="../RegistrationPage/registration_form.html">Start your journey</a></p>
                    </div>

                    <footer class="form-footer reveal-item">
                        <p>&copy; 2026 Beyond the Pyramids. All rights reserved.</p>
                    </footer>
                </div>
            </main>
        </div>
    </div>

    <script src="../mockData.js"></script>
    <script src="../storage.js"></script>
    <script src="../global.js"></script>
</body>

</html>
